apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
      annotations:
        rollme: {{ randAlphaNum 5 | quote }}
    spec:
      containers:
        - name: {{ .Release.Name }}
          image: ghcr.io/emitra-labs/{{ .Release.Name }}:{{ .Values.image.tag }}
          imagePullPolicy: Always
          ports:
            {{ if has "http" .Values.deploy.protocols }}
            - containerPort: 3000
            {{ end }}
            {{ if has "grpc" .Values.deploy.protocols }}
            - containerPort: 4000
            {{ end }}
          {{ if has "http" .Values.deploy.protocols }}
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
          {{ else if has "grpc" .Values.deploy.protocols }}
          readinessProbe:
            grpc:
              port: 4000
            initialDelaySeconds: 5
          {{ end }}
