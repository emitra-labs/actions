name: Build SvelteKit project as a Docker image

on:
  workflow_call:
    inputs:
      adapter:
        default: 'static'
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout actions repository
        uses: actions/checkout@v4
        with:
          repository: emitra-labs/actions
          ref: main
          path: actions

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Cache
        uses: actions/cache@v4
        id: cache
        with:
          path: |
            pnpm-store
            svelte-kit
          key: cache-${{ hashFiles('actions/sveltekit-static.Dockerfile') }}

      - name: inject cache into Docker
        uses: reproducible-containers/buildkit-cache-dance@v3.1.0
        with:
          cache-map: |
            {
              "pnpm-store": "/pnpm/store",
              "svelte-kit": "/code/.svelte-kit"
            }
          skip-extraction: ${{ steps.cache.outputs.cache-hit }}

      - name: Move .dockerignore to project directory
        run: mv actions/.dockerignore .

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: actions/svelte-${{ inputs.adapter }}.Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
