name: Deploy Go app

on:
  workflow_call:

jobs:
  k8s:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout actions repository
        uses: actions/checkout@v4
        with:
          repository: ukasyah-lab/actions
          ref: main
          token: ${{ secrets.PAT_REPO }}
          path: actions

      - name: ZeroTier
        uses: zerotier/github-action@v1.0.1
        with:
          network_id: ${{ secrets.ZEROTIER_NETWORK_ID }}
          auth_token: ${{ secrets.ZEROTIER_CENTRAL_TOKEN }}

      - name: Get app name
        id: app-name
        uses: MariachiBear/get-repo-name-action@v1.3.0

      - name: Get app version
        id: app-version
        uses: mikefarah/yq@master
        with:
          cmd: yq '.version' 'actions.yaml'

      - name: Get host deployment
        id: host
        uses: mikefarah/yq@master
        with:
          cmd: yq '.deploy.host' 'actions.yaml'

      - uses: azure/setup-helm@v4

      - name: Create ~/.kube/config file
        run: |
          mkdir -p /home/runner/.kube
          echo "${{ secrets.KUBECONFIG }}" >> /home/runner/.kube/config

      - name: Create Chart.yaml file
        run: |
          export APP_NAME="${{ steps.app-name.outputs.repository-name }}"
          export APP_VERSION="${{ steps.app-version.outputs.result }}"
          envsubst < actions/.helm/Chart.template.yaml > actions/.helm/Chart.yaml

      - name: Deploy to default namespace
        run: |
          helm upgrade --install --history-max=1 \
            -n default -f actions.yaml \
            --set image.tag="main" \
            --set deploy.ingress.host="${{ steps.host.outputs.result }}" \
            ${{ steps.app-name.outputs.repository-name }} \
            actions/.helm
